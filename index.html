<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리서치 워크벤치</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7F9;
    --panel:#FFFFFF;
    --ink:#18222C;
    --ink-soft:#48586A;
    --muted:#8C99A8;
    --line:#E7EBF1;
    --line-strong:#D3DAE4;
    --accent:#0E6E63;
    --accent-ink:#0A4E46;
    --accent-soft:#E6F1EF;
    --up:#DE3B40;      /* 상승 (한국 관행: 빨강) */
    --up-soft:#FBE9E9;
    --down:#2E6FE0;    /* 하락 (한국 관행: 파랑) */
    --down-soft:#E8EFFC;
    --warn:#B4530E;
    --radius:10px;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;color:var(--ink);}
  ::selection{background:var(--accent-soft);}

  /* ---------- Shell ---------- */
  .app{display:grid;grid-template-columns:264px 1fr;height:100vh;}
  .sidebar{
    background:var(--panel);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .brand{
    padding:20px 18px 14px;
    border-bottom:1px solid var(--line);
  }
  .brand h1{
    font-size:15px;font-weight:600;margin:0;letter-spacing:-0.01em;
    display:flex;align-items:center;gap:8px;
  }
  .brand .mark{
    width:22px;height:22px;border-radius:6px;background:var(--ink);
    display:grid;place-items:center;flex:none;
  }
  .brand .mark span{
    width:9px;height:9px;border:2px solid #fff;border-radius:2px;border-top-color:transparent;transform:rotate(45deg);
  }
  .brand p{margin:3px 0 0 30px;font-size:11px;color:var(--muted);letter-spacing:0.02em;}

  .sb-tools{padding:12px 14px 8px;display:flex;flex-direction:column;gap:8px;}
  .search{
    display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);
    border-radius:8px;padding:7px 9px;background:#fff;
  }
  .search input{border:none;outline:none;background:none;font-size:13px;width:100%;}
  .search svg{flex:none;color:var(--muted);}
  .btn-add{
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:8px 10px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-add:hover{background:#0e1720;}

  .co-list{overflow-y:auto;padding:6px 10px 12px;flex:1;min-height:0;}
  .co-list .empty{color:var(--muted);font-size:12px;text-align:center;padding:24px 8px;line-height:1.6;}
  .co-item{
    width:100%;text-align:left;background:none;border:none;border-radius:8px;
    padding:9px 10px;display:flex;flex-direction:column;gap:2px;margin-bottom:2px;
    border:1px solid transparent;
  }
  .co-item:hover{background:var(--bg);}
  .co-item.active{background:var(--accent-soft);border-color:#cfe4e0;}
  .co-item .r1{display:flex;align-items:center;gap:8px;}
  .co-item .nm{font-weight:600;font-size:13.5px;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .co-item .tk{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .co-item .r2{display:flex;align-items:center;gap:6px;}
  .co-item .sc{font-size:11px;color:var(--ink-soft);}
  .sec-head{
    width:100%;display:flex;align-items:center;gap:6px;background:none;border:none;
    padding:9px 8px 5px;margin-top:6px;text-align:left;
  }
  .sec-head:first-child{margin-top:0;}
  .sec-head .caret{display:inline-flex;color:var(--muted);transform:rotate(90deg);transition:transform .15s;}
  .sec-head.collapsed .caret{transform:rotate(0deg);}
  .sec-head .sname{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:0.03em;text-transform:uppercase;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sec-head .scount{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg);border-radius:20px;padding:1px 7px;}
  .sec-head:hover .sname{color:var(--ink);}
  .rating{
    font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;letter-spacing:0.02em;
    border:1px solid transparent;
  }
  .rating.buy{color:var(--up);background:var(--up-soft);}
  .rating.hold{color:var(--warn);background:#F6EDE3;}
  .rating.sell{color:var(--down);background:var(--down-soft);}
  .rating.na{color:var(--muted);background:#EEF1F5;}

  .sb-foot{border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;}
  .sb-foot button{
    flex:1;background:none;border:1px solid var(--line-strong);border-radius:7px;
    padding:6px;font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:5px;
  }
  .sb-foot button:hover{border-color:var(--muted);color:var(--ink);}

  /* cloud sync bar */
  .cloud-bar{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;border-top:1px solid var(--line);padding:11px 14px;text-align:left;}
  .cloud-bar:hover{background:var(--bg);}
  .cloud-dot{width:8px;height:8px;border-radius:50%;flex:none;background:#B8C2CE;}
  .cloud-dot.ok{background:var(--accent);}
  .cloud-dot.err{background:var(--up);}
  .cloud-dot.sync{background:var(--warn);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .cloud-txt{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.25;}
  .cloud-txt b{font-size:12.5px;font-weight:600;color:var(--ink);}
  .cloud-sub{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cloud-caret{color:var(--muted);display:inline-flex;flex:none;}

  /* sync modal */
  .sync-modal{max-width:440px;}
  .sync-modal .field{margin-bottom:12px;}
  .sync-modal .field input{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;font-size:13px;outline:none;font-family:var(--mono);}
  .sync-modal .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .auth-err{font-size:12px;color:var(--muted);margin:2px 0 4px;line-height:1.5;}
  .sync-status{display:flex;align-items:center;gap:10px;background:var(--accent-soft);border:1px solid #cfe4e0;border-radius:10px;padding:12px 14px;}
  .sync-status b{font-size:13px;}
  .ss-mail{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono);margin-top:2px;}
  .guide{margin:6px 0 4px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .guide summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--accent-ink);padding:10px 12px;background:var(--bg);list-style:none;}
  .guide summary::-webkit-details-marker{display:none;}
  .guide summary:before{content:'▸ ';color:var(--muted);}
  .guide[open] summary:before{content:'▾ ';}
  .guide-body{padding:12px 14px;font-size:12px;color:var(--ink-soft);line-height:1.7;}
  .guide-body ol{margin:0 0 8px;padding-left:20px;}
  .guide-body li{margin-bottom:5px;}
  .guide-body b{color:var(--ink);}
  .sql-wrap{position:relative;margin:6px 0;}
  .sql-wrap .sql{background:#0f1720;color:#d7e2ee;font-family:var(--mono);font-size:10.5px;line-height:1.5;padding:12px;border-radius:8px;overflow-x:auto;white-space:pre;margin:0;}
  .copy-sql{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:10.5px;cursor:pointer;}
  .copy-sql:hover{background:rgba(255,255,255,.22);}

  /* viewer + footer + dataset */
  .viewer-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);border:1px solid #cfe4e0;border-radius:20px;padding:4px 11px;}
  .viewer-badge svg{transform:rotate(90deg);}
  .sb-foot.col{flex-direction:column;gap:7px;}
  .sb-foot .foot-row{display:flex;gap:8px;width:100%;}
  .sb-foot .foot-row button{flex:1;}
  .foot-wide{width:100%;background:none;border:1px solid var(--line-strong);border-radius:7px;padding:7px;font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;}
  .foot-wide:hover{border-color:var(--accent);color:var(--accent);}
  .ds-preview{font-size:12.5px;color:var(--ink-soft);line-height:1.95;margin:6px 0;}
  .ds-preview b{color:var(--ink);font-family:var(--mono);}
  .mode-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
  .est-table td .direct-in{width:100%;max-width:140px;text-align:right;font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:6px;padding:7px 9px;outline:none;margin-left:auto;display:block;background:#fff;}
  .est-table td .direct-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .doc textarea[readonly],.field input[readonly],.field select:disabled{background:var(--bg);cursor:default;color:var(--ink-soft);}
  .sync-modal .field input[readonly]{font-size:11px;color:var(--ink-soft);}

  /* ---------- Main ---------- */
  .main{overflow-y:auto;min-width:0;}
  .main-inner{max-width:960px;margin:0 auto;padding:26px 34px 80px;}

  .empty-main{height:100%;display:grid;place-items:center;text-align:center;padding:40px;}
  .empty-main .box{max-width:340px;}
  .empty-main h2{font-size:19px;margin:14px 0 6px;font-weight:600;}
  .empty-main p{color:var(--muted);font-size:13px;line-height:1.7;margin:0 0 18px;}
  .empty-main .big-mark{width:52px;height:52px;border-radius:13px;background:var(--accent-soft);display:inline-grid;place-items:center;color:var(--accent);}

  /* company header */
  .co-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px;}
  .co-head .title h2{font-size:24px;font-weight:700;margin:0;letter-spacing:-0.02em;}
  .co-head .meta{display:flex;align-items:center;gap:10px;margin-top:5px;color:var(--ink-soft);font-size:13px;flex-wrap:wrap;}
  .co-head .meta .tk{font-family:var(--mono);font-weight:500;color:var(--ink);}
  .co-head .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--line-strong);}
  .co-head .right{display:flex;align-items:center;gap:8px;flex:none;}
  .savechip{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .savechip .d{width:6px;height:6px;border-radius:50%;background:#B8C2CE;}
  .savechip.saved .d{background:var(--accent);}
  .icon-btn{
    background:none;border:1px solid var(--line-strong);border-radius:8px;width:32px;height:32px;
    display:grid;place-items:center;color:var(--ink-soft);
  }
  .icon-btn:hover{border-color:var(--muted);color:var(--ink);}
  .icon-btn.danger:hover{border-color:var(--up);color:var(--up);}

  /* tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:20px 0 24px;}
  .tab{
    background:none;border:none;padding:10px 2px;margin-right:22px;font-size:14px;font-weight:500;
    color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab:hover{color:var(--ink-soft);}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600;}

  /* ---------- Research tab ---------- */
  .research-top{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.03em;text-transform:uppercase;margin-bottom:6px;}
  .field input, .field select{
    width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;font-size:14px;outline:none;background:#fff;
  }
  .field input:focus, .field select:focus, .doc textarea:focus, .fx input:focus, .drv input:focus, .drv select:focus{
    border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
  }
  .doc-block{margin-bottom:20px;}
  .doc-block h3{font-size:13px;font-weight:600;margin:0 0 8px;display:flex;align-items:center;gap:8px;color:var(--ink);}
  .doc-block h3 .bar{width:3px;height:14px;border-radius:2px;background:var(--accent);}
  .doc textarea{
    width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:12px 13px;font-size:14px;line-height:1.7;
    outline:none;resize:none;background:#fff;overflow:hidden;min-height:60px;color:var(--ink);
  }
  .doc textarea::placeholder{color:#B4BEC9;}

  /* ---------- Model tab ---------- */
  .section-lead{margin-bottom:16px;}
  .section-lead h3{font-size:16px;font-weight:600;margin:0 0 3px;letter-spacing:-0.01em;}
  .section-lead p{margin:0;color:var(--muted);font-size:12.5px;}

  .drv-table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:8px;}
  .drv-table th{
    font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;
    text-align:left;padding:0 8px 7px;
  }
  .drv-table th.num, .drv-table td.num{text-align:right;}
  .drv td{padding:4px 6px 4px 0;}
  .drv td:first-child{padding-left:0;}
  .drv input, .drv select{
    width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-size:13px;outline:none;background:#fff;
  }
  .drv input.num{text-align:right;font-family:var(--mono);}
  .drv .key{font-family:var(--mono);color:var(--accent-ink);}
  .drv .del{
    background:none;border:none;color:var(--muted);width:28px;height:28px;border-radius:6px;display:grid;place-items:center;
  }
  .drv .del:hover{background:var(--up-soft);color:var(--up);}
  .btn-row{
    background:none;border:1px dashed var(--line-strong);border-radius:8px;padding:8px;width:100%;
    font-size:13px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;
  }
  .btn-row:hover{border-color:var(--accent);color:var(--accent);}

  .fx-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px;}
  .fx label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;margin-bottom:7px;}
  .fx .tag{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;background:var(--ink);padding:1px 6px;border-radius:5px;}
  .fx .tag.op{background:var(--accent);}
  .fx input{
    width:100%;font-family:var(--mono);font-size:14px;border:1px solid var(--line-strong);border-radius:8px;padding:10px 12px;outline:none;background:#fff;
  }
  .fx .hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6;}
  .fx .err{color:var(--up);font-size:12px;margin-top:6px;font-weight:500;}
  .vars-help{margin-top:18px;font-size:12px;color:var(--ink-soft);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:11px 13px;line-height:1.7;}
  .vars-help code{font-family:var(--mono);background:#fff;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11.5px;color:var(--accent-ink);}

  /* result cards */
  .result-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:26px;}
  .rcard{border:1px solid var(--line);border-radius:12px;padding:15px 16px;background:linear-gradient(180deg,#fff,#fcfdfd);}
  .rcard .lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.02em;}
  .rcard .val{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px;letter-spacing:-0.02em;line-height:1.1;}
  .rcard .unit{font-size:12px;color:var(--muted);font-weight:400;margin-left:4px;font-family:var(--sans);}

  /* ---------- Sensitivity tab ---------- */
  .sens-block{margin-bottom:34px;}
  .sens-block > .head{margin-bottom:14px;}
  .sens-block > .head h3{font-size:16px;font-weight:600;margin:0 0 3px;letter-spacing:-0.01em;}
  .sens-block > .head p{margin:0;color:var(--muted);font-size:12.5px;}

  .whatif{display:grid;grid-template-columns:1.15fr 1fr;gap:26px;align-items:start;}
  .wi-controls{display:flex;flex-direction:column;gap:15px;}
  .wi-row .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .wi-row .nm{font-size:13px;font-weight:500;}
  .wi-row .cur{font-family:var(--mono);font-size:13px;font-weight:600;}
  .wi-row .cur .u{color:var(--muted);font-weight:400;font-size:11px;margin-left:3px;}
  .wi-row input[type=range]{width:100%;accent-color:var(--accent);height:4px;}
  .wi-row .scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;}
  .wi-reset{align-self:flex-start;background:none;border:1px solid var(--line-strong);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .wi-reset:hover{border-color:var(--muted);color:var(--ink);}

  .wi-out{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .wi-out .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .wi-out .row:last-child{border-bottom:none;}
  .wi-out .row .k{font-size:12.5px;color:var(--ink-soft);font-weight:500;}
  .wi-out .row .v{text-align:right;}
  .wi-out .row .v .big{font-family:var(--mono);font-size:17px;font-weight:600;}
  .wi-out .row .v .base{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px;}
  .delta{font-family:var(--mono);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:2px;}
  .delta.up{color:var(--up);}
  .delta.down{color:var(--down);}
  .delta.flat{color:var(--muted);}

  /* tornado */
  .tornado{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .trow{display:grid;grid-template-columns:120px 1fr;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);}
  .trow:last-child{border-bottom:none;}
  .trow:nth-child(odd){background:#fcfdfe;}
  .trow .tlbl{font-size:12.5px;font-weight:500;padding-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .trow .track{position:relative;height:26px;}
  .trow .center{position:absolute;top:-4px;bottom:-4px;width:1px;background:var(--line-strong);}
  .trow .seg{position:absolute;top:4px;height:18px;border-radius:3px;display:flex;align-items:center;}
  .trow .seg.pos{background:var(--up-soft);border:1px solid #f2c9ca;}
  .trow .seg.neg{background:var(--down-soft);border:1px solid #c4d6f5;}
  .trow .seg .lab{font-family:var(--mono);font-size:10px;font-weight:600;padding:0 5px;white-space:nowrap;}
  .trow .seg.pos .lab{color:var(--up);margin-left:auto;}
  .trow .seg.neg .lab{color:var(--down);}
  .tornado-legend{display:flex;gap:16px;font-size:11px;color:var(--ink-soft);margin-top:10px;align-items:center;}
  .tornado-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .tornado-swing{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);}
  .tornado-swing select{border:1px solid var(--line-strong);border-radius:7px;padding:5px 8px;font-size:12px;background:#fff;outline:none;}

  /* two-way grid */
  .grid-controls{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
  .gc{display:flex;flex-direction:column;gap:6px;}
  .gc span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.03em;}
  .gc select{border:1px solid var(--line-strong);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;outline:none;min-width:130px;}
  .seg-toggle{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;}
  .seg-toggle button{background:#fff;border:none;padding:8px 14px;font-size:12.5px;color:var(--ink-soft);font-weight:500;}
  .seg-toggle button.on{background:var(--ink);color:#fff;}
  .heat-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  table.heat{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12px;}
  table.heat th, table.heat td{padding:9px 10px;text-align:center;border:1px solid #EFF2F6;white-space:nowrap;}
  table.heat thead th{background:var(--bg);color:var(--ink-soft);font-weight:600;font-size:11px;}
  table.heat tbody th{background:var(--bg);color:var(--ink-soft);font-weight:600;font-size:11px;}
  table.heat .corner{background:#fff;}
  table.heat .corner .xl{color:var(--accent-ink);}table.heat .corner .yl{color:var(--muted);}
  table.heat td{font-weight:500;color:var(--ink);}
  table.heat td.base-cell{outline:2px solid var(--ink);outline-offset:-2px;font-weight:700;}

  .axis-note{font-size:11px;color:var(--muted);margin-top:9px;font-family:var(--mono);}

  .no-model{color:var(--muted);font-size:13px;text-align:center;padding:40px;border:1px dashed var(--line-strong);border-radius:12px;line-height:1.7;}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(24,34,44,.4);display:grid;place-items:center;z-index:50;padding:20px;backdrop-filter:blur(2px);}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:380px;padding:22px;box-shadow:0 20px 50px rgba(24,34,44,.22);}
  .modal h3{margin:0 0 4px;font-size:17px;font-weight:600;}
  .modal p.sub{margin:0 0 16px;color:var(--muted);font-size:12.5px;}
  .modal .field{margin-bottom:12px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .modal-actions button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);}
  .modal-actions button.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .modal-actions button.primary:hover{background:#0e1720;}
  .modal-actions button.danger{background:var(--up);color:#fff;border-color:var(--up);}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  /* ---------- Estimates tab ---------- */
  .est-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .est-name{font-size:15px;font-weight:600;}
  .est-code{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:8px;}
  .est-legend{display:flex;gap:14px;font-size:11.5px;color:var(--ink-soft);}
  .est-legend .lg-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .lg-dot.act{background:var(--accent);}
  .lg-dot.est{background:var(--accent-soft);border:1px dashed var(--accent);}

  .est-table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  .est-table th, .est-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
  .est-table thead th{font-size:11px;font-weight:600;color:var(--ink-soft);background:var(--bg);position:relative;}
  .est-table thead th.est{color:var(--muted);}
  .est-table thead th.act{color:var(--accent-ink);}
  .est-table .tag-mini{display:block;font-size:9px;font-weight:600;letter-spacing:0.02em;margin-top:2px;opacity:.8;}
  .est-table .rowlbl{text-align:left;font-weight:600;color:var(--ink);font-size:12.5px;background:#fff;position:sticky;left:0;}
  .est-table thead .rowlbl{background:var(--bg);}
  .est-table td .cv{font-family:var(--mono);font-weight:600;}
  .est-table td .cy{margin-top:2px;}
  .est-table td.est-cell{background:#FAFBFD;}
  .est-table td.est-cell .cv{color:var(--ink-soft);}
  .est-table.q th, .est-table.q td{padding:8px 9px;font-size:12px;}
  .est-table tbody tr:last-child th, .est-table tbody tr:last-child td{border-bottom:none;}

  .chart-card{border:1px solid var(--line);border-radius:12px;padding:16px 14px 8px;background:#fff;}
  .ann-chart{display:block;}

  .compare{margin-top:12px;font-size:12.5px;color:var(--ink-soft);background:var(--accent-soft);border:1px solid #cfe4e0;border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .compare b{font-family:var(--mono);color:var(--ink);}
  .compare .vs{color:var(--muted);margin:0 4px;}

  /* projection grid */
  .proj-grid{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px;}
  .proj-grid th,.proj-grid td{padding:7px 12px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right;}
  .proj-grid thead th{font-size:11px;font-weight:600;color:var(--ink-soft);background:var(--bg);}
  .proj-grid thead th.name{text-align:left;}
  .proj-grid .yr-tag{display:block;font-size:9px;font-weight:600;opacity:.7;margin-top:2px;}
  .proj-grid td.name,.proj-grid th.name{text-align:left;font-weight:500;color:var(--ink);}
  .proj-grid td.name .u{color:var(--muted);font-weight:400;font-size:11px;}
  .proj-grid td.base{font-family:var(--mono);color:var(--muted);}
  .proj-grid td.yr input{width:112px;text-align:right;font-family:var(--mono);font-size:12.5px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;outline:none;margin-left:auto;display:block;background:#fff;}
  .proj-grid td.yr input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .proj-grid tbody tr:last-child th,.proj-grid tbody tr:last-child td{border-bottom:none;}

  .proj-legend{display:flex;gap:16px;font-size:11px;color:var(--ink-soft);margin-top:10px;align-items:center;padding:0 2px;}
  .proj-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .proj-legend .sw.line{width:14px;height:0;border-top:2px solid #B4530E;border-radius:0;}

  /* compare table */
  .cmp-wrap{margin-top:16px;border:1px solid #cfe4e0;border-radius:12px;padding:14px;background:var(--accent-soft);}
  .cmp-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--accent-ink);}
  .cmp-title .cmp-note{font-weight:400;color:var(--ink-soft);font-size:11.5px;}
  .cmp-wrap .heat-wrap{background:#fff;}
  .est-table .rowlbl.sub{font-weight:400;color:var(--muted);font-size:11.5px;padding-left:20px;}
  .cmp-foot{font-size:11px;color:var(--ink-soft);margin-top:9px;line-height:1.5;}

  .relink{margin-top:8px;font-size:12px;color:var(--muted);}
  .relink b{color:var(--ink-soft);}
  .linkbtn{background:none;border:none;color:var(--accent);font-size:12px;text-decoration:underline;padding:0;cursor:pointer;}

  .link-box{border:1px dashed var(--line-strong);border-radius:12px;padding:22px;text-align:center;}
  .lb-title{font-size:15px;font-weight:600;margin-bottom:5px;}
  .lb-sub{color:var(--muted);font-size:12.5px;margin-bottom:16px;line-height:1.6;}
  .lb-search{max-width:420px;margin:0 auto;text-align:left;}
  .lb-search input{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;}
  .lb-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .lb-results{margin-top:8px;max-height:280px;overflow-y:auto;}
  .lb-item{width:100%;display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:5px;text-align:left;}
  .lb-item:hover{border-color:var(--accent);background:var(--accent-soft);}
  .lb-item .nm{font-weight:500;font-size:13px;}
  .lb-item .cd{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .lb-none{color:var(--muted);font-size:12.5px;padding:10px;text-align:center;}

  .mobile-picker{display:none;}

  /* ---------- Responsive ---------- */
  @media (max-width:860px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .main-inner{padding:18px 16px 70px;}
    .mobile-picker{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10;}
    .mobile-picker select{flex:1;border:1px solid var(--line-strong);border-radius:8px;padding:9px;font-size:14px;background:#fff;outline:none;}
    .mobile-picker button{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:500;}
    .research-top,.fx-grid,.result-cards{grid-template-columns:1fr;}
    .whatif{grid-template-columns:1fr;}
    .co-head .title h2{font-size:20px;}
  }
</style>
</head>

function num(x){ const n=typeof x==='number'?x:parseFloat(x); return isFinite(n)?n:NaN; }
function fmt(n){
  if(n==null||!isFinite(n)) return '—';
  const a=Math.abs(n);

function pctChange(cur,base){
  if(base==null||cur==null||!isFinite(base)||!isFinite(cur)||base===0) return null;

}

/* ---------- Excel -> dataset parser (self-service update) ---------- */
function buildDatasetFromRows(rows){
  let h=-1;
  for(let i=0;i<rows.length;i++){ const r=rows[i]; if(r && r[0]==='Code'){ h=i; break; } }
  if(h<3) throw new Error('형식 인식 실패: "Code" 헤더 행을 찾지 못했습니다.');
  const periodRow=rows[h-3]||[], acctRow=rows[h-4]||[], metricRow=rows[h]||[];
  const eok=v=>{ if(v==null||v==='·'||v==='') return null; const n=parseFloat(v); return isFinite(n)?Math.round(n/1e8):null; };
  const qOrder=[], aOrder=[], revCol={}, opCol={};
  for(let c=3;c<metricRow.length;c++){
    const m=metricRow[c];
    const metric = m==='영업이익'?'op' : m==='매출액'?'rev' : null;
    if(!metric) continue;
    const ps=String(periodRow[c]==null?'':periodRow[c]);
    const actual = String(acctRow[c]==null?'':acctRow[c]).charAt(0)==='M';
    let key,label,year,kind,q=null;
    const am=ps.match(/^(\d{4})AS$/);
    if(am){ kind='a'; year=+am[1]; label=String(year); key='a'+year; }
    else if(/^\d{6}$/.test(ps)){ kind='q'; year=+ps.slice(0,4); const mo=+ps.slice(4,6); q=Math.floor((mo-1)/3)+1; label=(year%100)+'.'+q+'Q'; key='q'+year+'_'+q; }
    else continue;
    (metric==='rev'?revCol:opCol)[key]=c;
    const arr=kind==='a'?aOrder:qOrder;
    if(!arr.some(x=>x.key===key)) arr.push({key,label,year,actual});
  }
  if(!qOrder.length && !aOrder.length) throw new Error('기간(분기/연간) 열을 인식하지 못했습니다.');
  const cos={};
  for(let i=h+1;i<rows.length;i++){
    const r=rows[i]; if(!r||r[0]==null||r[0]==='') continue;
    const code=(''+r[0]).replace(/^A/,'').trim();
    if(!/^[0-9A-Za-z]{4,8}$/.test(code)) continue;
    const name=r[1]!=null?(''+r[1]).trim():'';
    const qr=qOrder.map(p=>eok(r[revCol[p.key]])), qo=qOrder.map(p=>eok(r[opCol[p.key]]));
    const ar=aOrder.map(p=>eok(r[revCol[p.key]])), ao=aOrder.map(p=>eok(r[opCol[p.key]]));
    if([...qr,...qo,...ar,...ao].every(x=>x==null)) continue;
    cos[code]={n:name,qr,qo,ar,ao};
  }
  if(!Object.keys(cos).length) throw new Error('데이터 행을 찾지 못했습니다.');
  const lead=arr=>{ let n=0; for(const p of arr){ if(p.actual)n++; else break; } return n; };
  const meta={ qLabels:qOrder.map(p=>p.label), aLabels:aOrder.map(p=>p.label), qActual:lead(qOrder), aActual:lead(aOrder) };
  return {cos,meta};
}

let _xlsxLoading=null;

}

/* ---------- 연간 추정 (올해 + 향후 2개년) ---------- */
const CUR_YEAR=new Date().getFullYear();
const PROJECT_YEARS=[CUR_YEAR,CUR_YEAR+1,CUR_YEAR+2];
function projValue(d,yi,year){
  if(yi===0) return num(d.base);            // 올해 = 기준값
  const p=d.proj&&d.proj[year];
  return (p!=null&&p!=='')? num(p): num(d.base);
}
function computeProjection(c){
  if(c.model.mode==='direct'){
    return PROJECT_YEARS.map((year,yi)=>{
      const d=directYear(c,year);
      const revenue=num(d.rev), op=num(d.op);
      const margin=(isFinite(revenue)&&revenue!==0&&isFinite(op))? op/revenue*100 : NaN;
      const err=(isFinite(revenue)&&isFinite(op))? null : '입력 필요';
      return {year,yi,revenue,op,margin,err};
    });
  }
  return PROJECT_YEARS.map((year,yi)=>{
    const ov={};
    c.model.drivers.forEach(d=>{const k=(d.key||'').trim(); if(k) ov[k]=projValue(d,yi,year);});
    const r=computeScenario(c,ov);
    return Object.assign({year,yi},r);
  });
}
function normCode(t){
  if(t==null) return '';
  const d=(''+t).replace(/[^0-9]/g,'');
  if(!d) return '';
  return d.length>=6 ? d.slice(-6) : d.padStart(6,'0');
}
function findMatch(c){
  if(!(typeof ACTIVE.cos!=='undefined')) return null;
  if(c.dsKey && ACTIVE.cos[c.dsKey]) return c.dsKey;
  const bc=normCode(c.ticker);
  if(bc && ACTIVE.cos[bc]) return bc;
  const nm=(c.name||'').trim();
  if(nm && NAME2CODE[nm]) return NAME2CODE[nm];
  return null;
}
function autoMatch(c){
  const k=findMatch(c);
  c.dsKey=k||null;
  if(k){
    const rec=ACTIVE.cos[k];
    if(!c.ticker) c.ticker=k;
    if(!c.name || c.name==='새 기업') c.name=rec.n;
  }
  return k;
}
/* 억원 → 조/억 적응 포맷 */
function fmtEok(v){
  if(v==null||!isFinite(v)) return '—';
  const a=Math.abs(v);
  if(a>=10000) return (v/10000).toLocaleString('ko-KR',{maximumFractionDigits:a>=100000?0:1})+'조';
  return v.toLocaleString('ko-KR')+'억';
}
/* 내 모델 결과 단위 → 억원 환산 계수 (컨센서스는 억원 기준). 인식 못 하면 null */
function unitFactorToEok(unit){
  if(unit==null) return null;
  const u=(''+unit).trim().replace(/\s/g,'');
  const map={'원':1e-8,'만원':1e-4,'십만원':1e-3,'백만원':0.01,'천만원':0.1,
             '억원':1,'억':1,'십억원':10,'십억':10,'백억원':100,'백억':100,
             '조원':10000,'조':10000,'백만':0.01,'십억원(bn)':10};
  return (u in map)? map[u] : null;
}
function yoyPct(cur,prev){
  if(cur==null||prev==null||!isFinite(cur)||!isFinite(prev)||prev===0) return null;
  return (cur-prev)/Math.abs(prev)*100;
}
function opm(rev,op){ return (rev!=null&&op!=null&&isFinite(rev)&&rev!==0)? op/rev*100 : null; }
function deltaSpan(v,isPct){
  if(v==null) return el('span',{class:'delta flat'},'—');
  const cls=v>0.05?'up':v<-0.05?'down':'flat';
  const ar=v>0.05?'▲':v<-0.05?'▼':'–';
  const txt=(v>=0?'+':'')+v.toLocaleString('ko-KR',{maximumFractionDigits:1})+(isPct?'%p':'%');
  return el('span',{class:'delta '+cls}, ar+' '+txt);
}

/* ---------- expression engine (self-contained, hangul-aware) ---------- */
const _rpnCache=new Map();
function tokenize(src){
  const T=[]; let i=0;
  const isDigit=c=>c>='0'&&c<='9';
  const idStart=c=>/[\p{L}_]/u.test(c);
  const idChar=c=>/[\p{L}\p{N}_]/u.test(c);
  while(i<src.length){
    const c=src[i];
    if(c===' '||c==='\t'||c==='\n'||c==='\r'){i++;continue;}
    if(isDigit(c)||(c==='.'&&isDigit(src[i+1]))){
      let s=''; while(i<src.length&&(isDigit(src[i])||src[i]==='.'))s+=src[i++];
      T.push({t:'num',v:parseFloat(s)}); continue;
    }
    if(idStart(c)){
      let s=''; while(i<src.length&&idChar(src[i]))s+=src[i++];
      let j=i; while(src[j]===' ')j++;
      T.push(src[j]==='(' ? {t:'func',v:s} : {t:'id',v:s});
      continue;
    }
    if('+-*/^%'.includes(c)){T.push({t:'op',v:c});i++;continue;}
    if(c==='('){T.push({t:'lp'});i++;continue;}
    if(c===')'){T.push({t:'rp'});i++;continue;}
    if(c===','){T.push({t:'cm'});i++;continue;}
    throw new Error('알 수 없는 문자 "'+c+'"');
  }
  return T;
}
function toRPN(T){
  const out=[],st=[];
  const prec={'u-':5,'^':4,'*':3,'/':3,'%':3,'+':2,'-':2};
  const rassoc={'^':1,'u-':1};
  let prev=null;
  for(const tok of T){
    if(tok.t==='num'||tok.t==='id'){out.push(tok);}
    else if(tok.t==='func'){st.push(tok);}
    else if(tok.t==='cm'){
      while(st.length&&st[st.length-1].t!=='lp')out.push(st.pop());
      if(!st.length)throw new Error('쉼표 위치 오류');
    }
    else if(tok.t==='op'){
      const unary=(tok.v==='-'||tok.v==='+')&&(prev===null||prev.t==='op'||prev.t==='lp'||prev.t==='cm');
      if(unary&&tok.v==='+'){prev=tok;continue;}
      const o=unary?'u-':tok.v;
      while(st.length){
        const top=st[st.length-1];
        if(top.t!=='op')break;
        const cond=rassoc[o]? prec[o]<prec[top.v] : prec[o]<=prec[top.v];
        if(cond)out.push(st.pop()); else break;
      }
      st.push({t:'op',v:o});
    }
    else if(tok.t==='lp'){st.push(tok);}
    else if(tok.t==='rp'){
      while(st.length&&st[st.length-1].t!=='lp')out.push(st.pop());
      if(!st.length)throw new Error('괄호 짝이 맞지 않음');
      st.pop();
      if(st.length&&st[st.length-1].t==='func')out.push(st.pop());
    }
    prev=tok;
  }
  while(st.length){const s=st.pop(); if(s.t==='lp')throw new Error('괄호 짝이 맞지 않음'); out.push(s);}
  return out;
}
const FUNCS={
  min:(a,b)=>Math.min(a,b),max:(a,b)=>Math.max(a,b),pow:(a,b)=>Math.pow(a,b),
  abs:a=>Math.abs(a),round:a=>Math.round(a),sqrt:a=>Math.sqrt(a),floor:a=>Math.floor(a),ceil:a=>Math.ceil(a)
};
const BINFUNC={min:1,max:1,pow:1};
function evalRPN(rpn,scope){
  const s=[];
  for(const tok of rpn){
    if(tok.t==='num')s.push(tok.v);
    else if(tok.t==='id'){
      if(!(tok.v in scope))throw new Error('변수 "'+tok.v+'" 없음');
      s.push(scope[tok.v]);
    }
    else if(tok.t==='op'){
      if(tok.v==='u-'){s.push(-s.pop());}
      else{const b=s.pop(),a=s.pop();
        s.push(tok.v==='+'?a+b:tok.v==='-'?a-b:tok.v==='*'?a*b:tok.v==='/'?a/b:tok.v==='%'?a%b:Math.pow(a,b));
      }
    }
    else if(tok.t==='func'){
      const f=FUNCS[tok.v]; if(!f)throw new Error('함수 "'+tok.v+'" 없음');
      if(BINFUNC[tok.v]){const b=s.pop(),a=s.pop();s.push(f(a,b));}
      else s.push(f(s.pop()));
    }
  }
  if(s.length!==1)throw new Error('수식 형식 오류');
  const r=s[0];
  if(!isFinite(r))throw new Error('계산 결과가 유효하지 않음');
  return r;
}
function evalFormula(src,scope){
  if(!src||!src.trim())throw new Error('수식이 비어 있음');
  let rpn=_rpnCache.get(src);
  if(!rpn){ rpn=toRPN(tokenize(src)); _rpnCache.set(src,rpn); }
  return evalRPN(rpn,scope);
}

/* ---------- compute a company scenario ---------- */
function directYear(c,year){
  const y=(c.model.direct&&c.model.direct.years)||{};
  return y[year]||{};
}
function computeScenario(company, overrides){
  const m=company.model;
  if(m.mode==='direct'){
    const d=directYear(company, PROJECT_YEARS[0]);
    const revenue=num(d.rev), op=num(d.op);
    const margin=(isFinite(revenue)&&revenue!==0&&isFinite(op))? op/revenue*100 : NaN;
    const err=(isFinite(revenue)&&isFinite(op))? null : '매출·영업이익을 입력하세요';
    return {revenue,op,margin,err};
  }
  overrides=overrides||{};
  const scope={};
  for(const d of m.drivers){
    const k=(d.key||'').trim();
    if(!k) continue;
    scope[k] = (k in overrides)? overrides[k] : num(d.base);
  }
  let revenue=NaN, op=NaN, err=null;
  try{
    revenue=evalFormula(m.revenueFormula,scope);
    const s2=Object.assign({},scope,{revenue:revenue,'매출':revenue,'매출액':revenue});
    op=evalFormula(m.opFormula,s2);
  }catch(e){ err=e.message; }
  const margin=(isFinite(revenue)&&revenue!==0&&isFinite(op))? op/revenue*100 : NaN;
  return {revenue,op,margin,err};
}
function modelReady(company){
  const m=company.model;
  if(m.mode==='direct'){
    return !computeScenario(company).err;
  }
  if(!m.drivers.some(d=>(d.key||'').trim())) return false;
  const r=computeScenario(company);
  return !r.err;
}

/* =========================================================
   CLOUD  (Supabase REST — auth + data, no SDK, pure fetch)
   ========================================================= */
const Cloud={
  cfg:null,        // {url, anonKey}
  session:null,    // {access_token, refresh_token, expires_at, user}
  status:'off',    // off | ready | syncing | synced | error
  msg:'',
  get configured(){ return !!(this.cfg&&this.cfg.url&&this.cfg.anonKey); },
  get authed(){ return !!(this.session&&this.session.access_token); },
  get enabled(){ return this.configured&&this.authed; },
  base(){ return this.cfg.url.replace(/\/+$/,''); },
  authHeaders(useToken=true){
    const h={'apikey':this.cfg.anonKey,'Content-Type':'application/json'};
    h['Authorization']='Bearer '+((useToken&&this.session)?this.session.access_token:this.cfg.anonKey);
    return h;
  },
  async loadCfg(){
    try{const c=await KV.get('rt:cloudcfg'); if(c)this.cfg=JSON.parse(c);}catch(e){}
    try{const s=await KV.get('rt:session'); if(s)this.session=JSON.parse(s);}catch(e){}
    if(this.configured) this.status=this.authed?'ready':'ready';
  },
  async saveCfg(){ await KV.set('rt:cloudcfg',JSON.stringify(this.cfg||{})); },
  async saveSession(){ if(this.session) await KV.set('rt:session',JSON.stringify(this.session)); else await KV.del('rt:session'); },
  _store(json){
    this.session={access_token:json.access_token,refresh_token:json.refresh_token,
      expires_at:Date.now()+((json.expires_in||3600)*1000),user:json.user||(json.session&&json.session.user)};
    return this.saveSession();
  },
  async signUp(email,pw){
    const r=await fetch(this.base()+'/auth/v1/signup',{method:'POST',headers:this.authHeaders(false),body:JSON.stringify({email,password:pw})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.msg||j.error_description||j.error||'회원가입 실패');
    if(j.access_token){ await this._store(j); return {confirmed:true}; }
    return {confirmed:false}; // 이메일 확인 필요
  },
  async signIn(email,pw){
    const r=await fetch(this.base()+'/auth/v1/token?grant_type=password',{method:'POST',headers:this.authHeaders(false),body:JSON.stringify({email,password:pw})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.msg||j.error_description||j.error||'로그인 실패');
    await this._store(j);
  },
  async refresh(){
    if(!this.session||!this.session.refresh_token) throw new Error('no refresh token');
    const r=await fetch(this.base()+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:this.authHeaders(false),body:JSON.stringify({refresh_token:this.session.refresh_token})});
    const j=await r.json();
    if(!r.ok) throw new Error('세션 만료');
    await this._store(j);
  },
  async ensureToken(){
    if(!this.session) throw new Error('로그인 필요');
    if(Date.now() > (this.session.expires_at-60000)) await this.refresh();
  },
  async signOut(){ this.session=null; await this.saveSession(); this.status=this.configured?'ready':'off'; },
  async _req(method,path,body){
    await this.ensureToken();
    const opt={method,headers:Object.assign(this.authHeaders(true),{'Prefer':'resolution=merge-duplicates,return=minimal'})};
    if(body!==undefined) opt.body=JSON.stringify(body);
    let r=await fetch(this.base()+'/rest/v1/'+path,opt);
    if(r.status===401){ await this.refresh(); opt.headers=Object.assign(this.authHeaders(true),{'Prefer':'resolution=merge-duplicates,return=minimal'}); r=await fetch(this.base()+'/rest/v1/'+path,opt); }
    return r;
  },
  async fetchAll(){
    await this.ensureToken();
    const r=await fetch(this.base()+'/rest/v1/companies?select=id,data,updated_at',{headers:this.authHeaders(true)});
    if(!r.ok){ if(r.status===401){await this.refresh(); return this.fetchAll();} throw new Error('데이터 조회 실패 ('+r.status+')'); }
    return await r.json(); // [{id,data,updated_at}]
  },
  // 로그인 안 해도 읽기(뷰어) : 공개 읽기 정책이 있어야 함
  async _get(path){
    if(this.authed){ try{ await this.ensureToken(); }catch(e){} }
    let r=await fetch(this.base()+'/rest/v1/'+path,{headers:this.authHeaders(this.authed)});
    if(r.status===401 && this.authed && this.session){ try{ await this.refresh(); r=await fetch(this.base()+'/rest/v1/'+path,{headers:this.authHeaders(true)}); }catch(e){} }
    return r;
  },
  async fetchCompanies(){
    const r=await this._get('companies?select=id,data,updated_at');
    if(!r.ok) throw new Error('데이터 조회 실패 ('+r.status+')');
    return await r.json();
  },
  async fetchAppData(key){
    const r=await this._get('app_data?key=eq.'+encodeURIComponent(key)+'&select=data');
    if(!r.ok){ if(r.status===404) return null; throw new Error('데이터 조회 실패 ('+r.status+')'); }
    const j=await r.json(); return (j&&j[0])? j[0].data : null;
  },
  async upsertAppData(key,data){
    const r=await this._req('POST','app_data',[{key,data,updated_at:new Date().toISOString()}]);
    if(!r.ok&&r.status!==201&&r.status!==200) throw new Error('데이터 저장 실패 ('+r.status+')');
  },
  async upsert(c){
    const row={id:c.id,data:c,updated_at:new Date(c.updatedAt||Date.now()).toISOString()};
    const r=await this._req('POST','companies',[row]);
    if(!r.ok&&r.status!==201&&r.status!==200) throw new Error('저장 실패 ('+r.status+')');
  },
  async removeRow(id){
    const r=await this._req('DELETE','companies?id=eq.'+encodeURIComponent(id));
    if(!r.ok&&r.status!==204&&r.status!==200) throw new Error('삭제 실패 ('+r.status+')');
  }
};
function setCloudStatus(st,msg){

/* 로컬 + 클라우드에 동시 저장 */
async function persist(c){
  if(VIEWER) return;
  await Store.save(c);
  if(Cloud.enabled){
    try{ setCloudStatus('syncing'); await Cloud.upsert(c); setCloudStatus('synced'); }
    catch(e){ setCloudStatus('error', e.message); }
  }
}
async function cloudDelete(id){
  if(VIEWER) return;
  if(Cloud.enabled){ try{ setCloudStatus('syncing'); await Cloud.removeRow(id); setCloudStatus('synced'); }catch(e){ setCloudStatus('error',e.message); } }
}
async function viewerRefresh(){
  try{
    await loadSharedDataset();
    const rows=await Cloud.fetchCompanies();
    const map={};
    rows.forEach(r=>{ const c=r.data; if(c&&c.id){ c.updatedAt=c.updatedAt||Date.parse(r.updated_at)||0; map[c.id]=c; } });
    S.companies=map;
    S.order=Object.keys(map).sort((a,b)=>(map[a].name||'').localeCompare(map[b].name||'','ko'));
    if(!S.companies[S.currentId]) S.currentId=S.order[0]||null;
    render(); toast('최신 데이터로 새로고침했습니다');
  }catch(e){ toast('새로고침 실패: '+e.message); }
}
/* 최초 로그인/부팅 시 양방향 병합 (updated_at 최신 우선) */
async function cloudSync(){
  if(!Cloud.enabled) return;
  setCloudStatus('syncing');
  try{
    const rows=await Cloud.fetchAll();
    const cloudMap={};
    rows.forEach(r=>{ const c=r.data; if(c&&c.id){ c.updatedAt=c.updatedAt||Date.parse(r.updated_at)||Date.now(); cloudMap[c.id]=c; } });
    // 클라우드 → 로컬 (더 최신이면 반영)
    for(const id in cloudMap){
      const cc=cloudMap[id], lc=S.companies[id];
      if(!lc || (cc.updatedAt||0) >= (lc.updatedAt||0)){ S.companies[id]=cc; await Store.save(cc); }
    }
    // 로컬 → 클라우드 (클라우드에 없거나 로컬이 더 최신)
    for(const id in S.companies){
      const lc=S.companies[id], cc=cloudMap[id];
      if(!cc || (lc.updatedAt||0) > (cc.updatedAt||0)){ try{ await Cloud.upsert(lc); }catch(e){} }
    }
    S.order=Object.keys(S.companies).sort((a,b)=>(S.companies[b].updatedAt||0)-(S.companies[a].updatedAt||0));
    if(!S.currentId||!S.companies[S.currentId]) S.currentId=S.order[0]||null;
    render();
    setCloudStatus('synced');
  }catch(e){ setCloudStatus('error', e.message); }
}

  let dotClass='off', label, sub;
  if(!Cloud.configured){ dotClass='off'; label='동기화 설정'; sub='여러 기기 자동 저장'; }

    el('span',{class:'cloud-dot '+dotClass}),

function projChart(proj,unit){
  const W=680,H=210,padL=8,padR=8,padT=22,padB=40;
  const n=proj.length;
  const revs=proj.map(p=>isFinite(p.revenue)?p.revenue:null);
  const ops=proj.map(p=>isFinite(p.op)?p.op:null);
  const all=[...revs,...ops].filter(v=>v!=null);
  if(!all.length) return el('div',{class:'no-model'},'표시할 계산 결과가 없습니다.');
  let mn=Math.min(0,...all), mx=Math.max(0,...all);
  const rng=(mx-mn)||1;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const bandW=plotW/n, barW=bandW*0.30, gap=bandW*0.06;
  const y0=padT+(mx/rng)*plotH;
  const yFor=v=>padT+((mx-v)/rng)*plotH;
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width','100%'); svg.setAttribute('class','ann-chart');
  const mk=(t,a,txt)=>{const e=document.createElementNS(svgNS,t);for(const k in a)e.setAttribute(k,a[k]);if(txt!=null)e.textContent=txt;return e;};
  svg.appendChild(mk('line',{x1:padL,y1:y0,x2:W-padR,y2:y0,stroke:'#D3DAE4','stroke-width':1}));
  const opmPts=[];
  proj.forEach((p,i)=>{
    const cx=padL+bandW*i+bandW/2;
    const rv=revs[i], op=ops[i];
    // revenue bar (left), op bar (right)
    const drawBar=(val,offset,fill)=>{
      if(val==null) return;
      const top=Math.min(y0,yFor(val)), bh=Math.max(Math.abs(yFor(val)-y0),1);
      svg.appendChild(mk('rect',{x:cx+offset-barW/2,y:top,width:barW,height:bh,rx:3,fill}));
      svg.appendChild(mk('text',{x:cx+offset,y:(val>=0?top-5:top+bh+12),'text-anchor':'middle','font-size':10,'font-family':'var(--mono)','font-weight':600,fill:'var(--ink-soft)'}, fmt(val)));
    };
    drawBar(rv, -(barW/2+gap/2), '#B7C4D3');
    drawBar(op,  (barW/2+gap/2), 'var(--accent)');
    if(p.margin!=null&&isFinite(p.margin)){
      opmPts.push({cx, cy: padT+plotH*0.12+(1-Math.max(0,Math.min(40,p.margin))/40)*plotH*0.55, m:p.margin});
    }
    svg.appendChild(mk('text',{x:cx,y:H-padB+22,'text-anchor':'middle','font-size':11,'font-family':'var(--sans)','font-weight':600,fill:'var(--ink-soft)'}, p.year));
  });
  if(opmPts.length>1){ let d=''; opmPts.forEach((p,i)=>d+=(i?'L':'M')+p.cx+' '+p.cy+' '); svg.appendChild(mk('path',{d,fill:'none',stroke:'#B4530E','stroke-width':1.6,'stroke-linejoin':'round'})); }
  opmPts.forEach(p=>{ svg.appendChild(mk('circle',{cx:p.cx,cy:p.cy,r:3,fill:'#fff',stroke:'#B4530E','stroke-width':1.6})); svg.appendChild(mk('text',{x:p.cx,y:p.cy-8,'text-anchor':'middle','font-size':10,'font-family':'var(--mono)',fill:'#B4530E','font-weight':600}, fmtPct(p.m))); });
  const legend=el('div',{class:'proj-legend'},
    el('span',{}, el('span',{class:'sw',style:{background:'#B7C4D3'}}),'매출'),
    el('span',{}, el('span',{class:'sw',style:{background:'var(--accent)'}}),'영업이익'),
    el('span',{}, el('span',{class:'sw line'}),'영업이익률'),
    unit?el('span',{style:{marginLeft:'auto',color:'var(--muted)'}},'단위 '+unit):null
  );
  return el('div',{class:'chart-card'}, svg, legend);
}

function buildLinkSearch(c){
  const box=el('div',{class:'lb-search'});
  const inp=el('input',{type:'text',placeholder:'종목명 또는 코드 검색 (예: 삼성전자 / 000660)'});
  const results=el('div',{class:'lb-results'});
  function search(){
    const q=inp.value.trim().toLowerCase();
    results.innerHTML='';
    if(!q) return;
    const digits=q.replace(/[^0-9]/g,'');
    let n=0;
    for(const code in ACTIVE.cos){
      const rec=ACTIVE.cos[code];
      const hit = (digits && code.includes(digits)) || rec.n.toLowerCase().includes(q);
      if(hit){
        results.appendChild(el('button',{class:'lb-item',onclick:()=>{
          c.dsKey=code; if(!c.ticker)c.ticker=code; scheduleSave(c.id); refreshSidebar(); renderTabBody(c);
        }}, el('span',{class:'nm'},rec.n), el('span',{class:'cd'},code)));
        if(++n>=12) break;
      }
    }
    if(!n) results.appendChild(el('div',{class:'lb-none'},'일치하는 종목이 없습니다'));
  }
  inp.addEventListener('input',search);
  box.appendChild(inp); box.appendChild(results);
  return box;
}

function annualChart(rec){
  const op=rec.ao, rev=rec.ar;
  const W=680,H=210,padL=8,padR=8,padT=20,padB=40;
  const n=ACTIVE.meta.aLabels.length;
  const vals=op.map(v=>v==null?null:v);
  const finite=vals.filter(v=>v!=null);
  if(!finite.length) return el('div',{class:'no-model'},'영업이익 데이터가 없습니다.');
  let mn=Math.min(0,...finite), mx=Math.max(0,...finite);
  const rng=(mx-mn)||1;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const bandW=plotW/n;
  const barW=bandW*0.46;
  const y0 = padT + (mx/rng)*plotH; // y for value 0
  const yFor=v=> padT + ((mx-v)/rng)*plotH;

  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width','100%');
  svg.setAttribute('class','ann-chart');
  const mk=(tag,attrs,txt)=>{const e=document.createElementNS(svgNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(txt!=null)e.textContent=txt;return e;};

  // zero baseline
  svg.appendChild(mk('line',{x1:padL,y1:y0,x2:W-padR,y2:y0,stroke:'#D3DAE4','stroke-width':1}));

  // OPM line points
  const opmPts=[];
  vals.forEach((v,i)=>{
    const cx=padL+bandW*i+bandW/2;
    const isEst=i>=ACTIVE.meta.aActual;
    if(v!=null){
      const top=Math.min(y0,yFor(v)), bh=Math.abs(yFor(v)-y0);
      const rect=mk('rect',{x:cx-barW/2,y:top,width:barW,height:Math.max(bh,1),rx:3,
        fill: v<0? (isEst?'#EAD3F2':'#E9D6D6') : (isEst? 'var(--accent-soft)':'var(--accent)'),
        stroke: isEst? 'var(--accent)':'none','stroke-width':isEst?1:0,
        'stroke-dasharray':isEst?'3 2':'0'});
      svg.appendChild(rect);
      // value label
      svg.appendChild(mk('text',{x:cx,y:(v>=0?top-6:top+bh+13),'text-anchor':'middle','font-size':11,'font-family':'var(--mono)','font-weight':600,fill:'var(--ink)'}, fmtEok(v)));
      const m=opm(rev[i],v);
      if(m!=null) opmPts.push({cx, cy: padT+plotH*0.15 + (1-Math.max(0,Math.min(40,m))/40)*plotH*0.55, m});
    }
    // x label
    svg.appendChild(mk('text',{x:cx,y:H-padB+22,'text-anchor':'middle','font-size':11,'font-family':'var(--sans)',fill: isEst?'var(--muted)':'var(--ink-soft)','font-weight':isEst?400:600}, ACTIVE.meta.aLabels[i]+(isEst?' (E)':'')));
  });
  // OPM polyline + dots
  if(opmPts.length>1){
    let d='';
    opmPts.forEach((p,i)=>{ d+=(i?'L':'M')+p.cx+' '+p.cy+' '; });
    svg.appendChild(mk('path',{d,fill:'none',stroke:'#B4530E','stroke-width':1.6,'stroke-linejoin':'round'}));
  }
  opmPts.forEach(p=>{
    svg.appendChild(mk('circle',{cx:p.cx,cy:p.cy,r:3,fill:'#fff',stroke:'#B4530E','stroke-width':1.6}));
    svg.appendChild(mk('text',{x:p.cx,y:p.cy-8,'text-anchor':'middle','font-size':10,'font-family':'var(--mono)',fill:'#B4530E','font-weight':600}, fmtPct(p.m)));
  });
  return el('div',{class:'chart-card'}, svg);
}

function buildWhatIf(c,base,u){
  const drivers=c.model.drivers.filter(d=>(d.key||'').trim());
  const state={}; drivers.forEach(d=>state[d.key]=num(d.base));

  const outRev=el('div',{class:'v'});
  const outOp=el('div',{class:'v'});
  const outMg=el('div',{class:'v'});

  function recompute(){
    const r=computeScenario(c,state);
    fillOut(outRev,r.revenue,base.revenue,u,false);
    fillOut(outOp,r.op,base.op,u,false);
    fillOut(outMg,r.margin,base.margin,'%p',true);
  }
  const controls=el('div',{class:'wi-controls'});
  drivers.forEach(d=>{
    const lo=num(d.low),hi=num(d.high),bv=num(d.base);
    const min=Math.min(lo,hi,bv), max=Math.max(lo,hi,bv);
    const span=(max-min)||Math.abs(bv)||1;
    const step=span/100;
    const curLbl=el('span',{class:'cur'});
    const setCur=v=>{curLbl.innerHTML=fmt(v)+(d.unit?'<span class="u">'+d.unit+'</span>':'');};
    setCur(bv);
    const range=el('input',{type:'range',min:min,max:max,step:step,value:bv,
      oninput:e=>{const v=parseFloat(e.target.value);state[d.key]=v;setCur(v);recompute();}});
    controls.appendChild(el('div',{class:'wi-row'},
      el('div',{class:'top'}, el('span',{class:'nm'},d.name||d.key), curLbl),
      range,
      el('div',{class:'scale'}, el('span',{},fmt(min)), el('span',{},fmt(max)))
    ));
  });
  controls.appendChild(el('button',{class:'wi-reset',onclick:()=>{
    drivers.forEach(d=>state[d.key]=num(d.base));
    // rebuild whole what-if to reset sliders
    const host=controls.closest('.whatif'); if(host){ const parent=host.parentNode; parent.replaceChild(buildWhatIf(c,base,u),host); }
  }},'기준값으로 초기화'));

  const outPanel=el('div',{class:'wi-out'},
    el('div',{class:'row'}, el('span',{class:'k'},'매출'), outRev),
    el('div',{class:'row'}, el('span',{class:'k'},'영업이익'), outOp),
    el('div',{class:'row'}, el('span',{class:'k'},'영업이익률'), outMg)
  );
  recompute();
  return el('div',{class:'whatif'}, controls, outPanel);
}
function fillOut(node,cur,base,unit,isPct){
  node.innerHTML='';
  node.appendChild(el('div',{class:'big'}, (isPct?fmtPct(cur):fmt(cur)) + (unit&&!isPct?' ':'') , unit&&!isPct? el('span',{style:{fontSize:'11px',color:'var(--muted)',fontWeight:'400'}},' '+unit):null));
  const dp = isPct ? (isFinite(cur)&&isFinite(base)? cur-base : null) : pctChange(cur,base);
  const cls = dp==null?'flat': dp>0.0001?'up': dp<-0.0001?'down':'flat';
  const arrow = dp==null?'': dp>0.0001?'▲': dp<-0.0001?'▼':'–';
  const txt = dp==null?'기준' : isPct? (dp>=0?'+':'')+dp.toLocaleString('ko-KR',{maximumFractionDigits:1})+'%p'
                                     : (dp>=0?'+':'')+dp.toLocaleString('ko-KR',{maximumFractionDigits:1})+'%';
  node.appendChild(el('div',{style:{marginTop:'2px'}}, el('span',{class:'delta '+cls}, arrow?arrow+' ':'', txt)));
}

function buildSwingControl(c,u){

    el('option',{value:'lowhigh'},'하방 ↔ 상방'),
    el('option',{value:'5'},'±5%'),
    el('option',{value:'10'},'±10%'),
    el('option',{value:'20'},'±20%')
  );
  return el('div',{class:'tornado-swing'}, el('span',{},'변동폭'), sel);
}
function renderTornado(c,u,mode){
  const host=document.getElementById('tornadoHost');
  if(!host)return;
  host.innerHTML='';
  const base=computeScenario(c);
  const baseOp=base.op;
  const drivers=c.model.drivers.filter(d=>(d.key||'').trim());
  const rows=[];
  for(const d of drivers){
    let lo,hi;
    if(mode==='lowhigh'){ lo=num(d.low); hi=num(d.high); }
    else{ const p=parseFloat(mode)/100; lo=num(d.base)*(1-p); hi=num(d.base)*(1+p); }
    const opLo=computeScenario(c,{[d.key]:lo}).op;
    const opHi=computeScenario(c,{[d.key]:hi}).op;
    if(!isFinite(opLo)||!isFinite(opHi))continue;
    rows.push({name:d.name||d.key, opLo, opHi, span:Math.abs(opHi-opLo)});
  }
  rows.sort((a,b)=>b.span-a.span);
  if(!rows.length){ host.appendChild(el('div',{class:'no-model'},'표시할 데이터가 없습니다.')); return; }

  let gmin=baseOp, gmax=baseOp;
  rows.forEach(r=>{gmin=Math.min(gmin,r.opLo,r.opHi);gmax=Math.max(gmax,r.opLo,r.opHi);});
  const pad=(gmax-gmin)*0.06||1; gmin-=pad; gmax+=pad;
  const scale=v=>((v-gmin)/(gmax-gmin))*100;

  const torn=el('div',{class:'tornado'});
  for(const r of rows){
    const basePos=scale(baseOp);
    const track=el('div',{class:'track'});
    track.appendChild(el('div',{class:'center',style:{left:basePos+'%'}}));
    // low side
    [['lo',r.opLo],['hi',r.opHi]].forEach(([side,val])=>{
      const p=scale(val);
      const left=Math.min(p,basePos), width=Math.abs(p-basePos);
      const positive = val>=baseOp;
      const seg=el('div',{class:'seg '+(positive?'pos':'neg'),style:{left:left+'%',width:Math.max(width,0.5)+'%'}});
      const diff=val-baseOp;
      const lab=el('span',{class:'lab'}, (diff>=0?'+':'')+fmt(diff));
      // put label outside toward the end
      seg.appendChild(lab);
      track.appendChild(seg);
    });
    torn.appendChild(el('div',{class:'trow'},
      el('div',{class:'tlbl',title:r.name},r.name),
      track
    ));
  }
  host.appendChild(torn);
  host.appendChild(el('div',{class:'tornado-legend'},
    el('span',{}, el('span',{class:'sw',style:{background:'var(--up-soft)',border:'1px solid #f2c9ca'}}),'영업이익 증가'),
    el('span',{}, el('span',{class:'sw',style:{background:'var(--down-soft)',border:'1px solid #c4d6f5'}}),'영업이익 감소'),
    el('span',{style:{marginLeft:'auto',color:'var(--muted)'}}, '기준 영업이익 '+fmt(baseOp)+(u?' '+u:''))
  ));
}

function buildTwoWay(c,u){
  const drivers=c.model.drivers.filter(d=>(d.key||'').trim());
  const st={ x: drivers[0]?.key, y: (drivers[1]||drivers[0])?.key, metric:'op' };

  const host=el('div',{});
  const mkSel=(which)=>{
    const s=el('select',{onchange:e=>{st[which]=e.target.value;draw();}});
    drivers.forEach(d=>s.appendChild(el('option',{value:d.key,selected:st[which]===d.key?'selected':null},d.name||d.key)));
    return s;
  };
  const opBtn=el('button',{class:'on',onclick:()=>{st.metric='op';opBtn.classList.add('on');revBtn.classList.remove('on');draw();}},'영업이익');
  const revBtn=el('button',{onclick:()=>{st.metric='rev';revBtn.classList.add('on');opBtn.classList.remove('on');draw();}},'매출');

  const controls=el('div',{class:'grid-controls'},
    el('div',{class:'gc'}, el('span',{},'가로축 (X)'), mkSel('x')),
    el('div',{class:'gc'}, el('span',{},'세로축 (Y)'), mkSel('y')),
    el('div',{class:'gc'}, el('span',{},'지표'), el('div',{class:'seg-toggle'},opBtn,revBtn))
  );
  const tableHost=el('div',{});
  host.appendChild(controls);
  host.appendChild(tableHost);

  function steps(d){
    const lo=num(d.low),hi=num(d.high);
    const a=Math.min(lo,hi),b=Math.max(lo,hi);
    const out=[]; for(let i=0;i<5;i++)out.push(a+(b-a)*i/4); return out;
  }
  function draw(){
    tableHost.innerHTML='';
    const dx=drivers.find(d=>d.key===st.x), dy=drivers.find(d=>d.key===st.y);
    if(!dx||!dy){tableHost.appendChild(el('div',{class:'no-model'},'변수를 선택하세요.'));return;}
    const xs=steps(dx), ys=steps(dy);
    const vals=[]; let mn=Infinity,mx=-Infinity;
    for(const yv of ys){ const row=[]; for(const xv of xs){
      const ov={[dx.key]:xv}; ov[dy.key]=yv;
      const r=computeScenario(c,ov);
      const v=st.metric==='op'?r.op:r.revenue;
      row.push(v); if(isFinite(v)){mn=Math.min(mn,v);mx=Math.max(mx,v);}
    } vals.push(row);}
    const bx=num(dx.base), by=num(dy.base);
    const nearest=(arr,t)=>arr.reduce((bi,v,i)=>Math.abs(v-t)<Math.abs(arr[bi]-t)?i:bi,0);
    const bxi=nearest(xs,bx), byi=nearest(ys,by);

    const table=el('table',{class:'heat'});
    const thead=el('thead',{});
    const hr=el('tr',{});
    hr.appendChild(el('th',{class:'corner'}, el('div',{class:'yl'},(dy.name||dy.key)+' ↓'), el('div',{class:'xl'},(dx.name||dx.key)+' →')));

      (st.metric==='op'?'영업이익':'매출')+' · 단위 '+(u||'—')+' · 다른 변수는 기준값 고정 · 굵은 테두리 = 기준 시나리오'));
  }
  draw();
  return host;
}
function heatColor(t){
  // t in [0,1]; 0=blue(low), 0.5=white, 1=red(high). Light tints for readability.
  t=Math.max(0,Math.min(1,t));
  const white=[255,255,255];
  const blue=[46,111,224], red=[222,59,64];
  let c, k;
  if(t<0.5){ k=(0.5-t)/0.5*0.5; c=mix(white,blue,k); }
  else{ k=(t-0.5)/0.5*0.5; c=mix(white,red,k); }
  return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
}
function mix(a,b,k){ return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }

function importData(){
  const inp=el('input',{type:'file',accept:'.json,application/json',style:{display:'none'}});
  inp.addEventListener('change',()=>{
    const f=inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const data=JSON.parse(rd.result);
        const list=Array.isArray(data)?data:data.companies;
        if(!Array.isArray(list))throw new Error('형식 오류');
        let added=0;
        for(const c of list){
          if(!c||!c.model||!c.research)continue;
          c.id=uid(); c.updatedAt=Date.now();
          S.companies[c.id]=c; S.order.push(c.id); persist(c); added++;
        }
        refreshSidebar();
        if(!S.currentId&&S.order.length)selectCompany(S.order[0]); else renderMainInner();
        toast(added+'개 기업을 가져왔습니다');
      }catch(e){ toast('가져오기 실패: 파일 형식을 확인하세요'); }
    };
    rd.readAsText(f);
  });
  document.body.appendChild(inp); inp.click(); inp.remove();
}

let toastTimer;
function toast(msg){
  let t=document.querySelector('.toast');
  if(!t){ t=el('div',{class:'toast'}); document.body.appendChild(t); }
  t.textContent=msg; requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1900);
}

    S.companies[seed.id]=seed; S.order=[seed.id];
    await Store.save(seed);
  }
  S.currentId=S.order[0]||null;
  render();
  if(Cloud.enabled){ cloudSync(); }
})();
</script>
